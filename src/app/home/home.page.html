<ion-content class="login-page">

  <div class="login-wrapper">

    <div class="logo-container">
      <h1>Bodega <span>NANF</span></h1>
      <p>Control de Ventas y Stock</p>
    </div>

    <div class="login-box">

      <h2>Iniciar Sesión</h2>

      <ion-item>
        <ion-input
          [(ngModel)]="usuario"
          placeholder="Usuario">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          [(ngModel)]="password"
          type="password"
          placeholder="Contraseña">
        </ion-input>
      </ion-item>

      <ion-button
        expand="block"
        class="login-btn"
        (click)="login()">
        Ingresar
      </ion-button>

      <p class="forgot">
      </p>

    </div>

  </div>

</ion-content>
